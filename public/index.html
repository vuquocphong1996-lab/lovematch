<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveMatch - Kết nối trái tim</title>
    <style>
        :root { --primary: #ff4757; --bg: #fff0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #app { background: white; width: 360px; height: 620px; border-radius: 25px; box-shadow: 0 15px 35px rgba(255, 71, 87, 0.2); display: flex; flex-direction: column; overflow: hidden; }
        h2 { background: var(--primary); color: white; margin: 0; padding: 18px; text-align: center; font-size: 20px; }
        #start-screen { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 15px; justify-content: center; }
        #chat-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #status { font-size: 12px; text-align: center; padding: 8px; background: #ffebee; color: var(--primary); font-weight: bold; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fffcfc; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 14px; }
        .my-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .stranger-msg { align-self: flex-start; background: #f1f2f6; color: #2f3542; border-bottom-left-radius: 4px; }
        #input-area { padding: 12px; display: flex; gap: 8px; border-top: 1px solid #ffecec; align-items: center; }
        input, select { padding: 10px; border-radius: 12px; border: 1px solid #ffccd2; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        img { max-width: 100%; border-radius: 12px; }
    </style>
</head>
<body>

<div id="app">
    <h2>LOVEMATCH</h2>
    
    <div id="start-screen">
        <div style="text-align: center; font-size: 50px;">💖</div>
        <input type="text" id="user-name" placeholder="Biệt danh...">
        <select id="user-gender"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
        <select id="find-gender"><option value="Nữ">Tìm Nữ</option><option value="Nam">Tìm Nam</option><option value="Both">Cả hai</option></select>
        <button onclick="startMatch()">BẮT ĐẦU HẸN HÒ</button>
    </div>

    <div id="chat-screen" class="hidden">
        <div id="status">Đang tìm đối phương...</div>
        <div id="chat-box"></div>
        <div id="typing-notify" style="height:15px; font-size:11px; color:#a4b0be; margin-left:15px;"></div>
        <div id="input-area">
            <button onclick="sendHeart()" style="background:none; font-size:24px;">❤️</button>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="uploadImage(this)">
            <button onclick="document.getElementById('file-input').click()">📎</button>
            <input type="text" id="msg-input" style="flex:1" placeholder="Nhập tin..." oninput="handleTyping()" onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">GỬI</button>
            <button onclick="leaveRoom()" style="background:#ff6b6b">RỜI</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentRoom = '', matchStartTime = 0;
    const PHOTO_WAIT = 60000;

    function startMatch() {
        const data = { name: document.getElementById('user-name').value || "Người lạ", gender: document.getElementById('user-gender').value, findGender: document.getElementById('find-gender').value };
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('chat-screen').classList.remove('hidden');
        socket.emit('start-match', data);
    }

    socket.on('matched', (data) => {
        currentRoom = data.roomName;
        matchStartTime = Date.now();
        document.getElementById('status').innerText = "Đang chat với: " + data.partnerName;
        addSystemMessage("Đã kết nối! Bạn có thể gửi ảnh sau 1 phút.");
    });

    socket.on('force-leave', () => { alert("Cuộc trò chuyện đã kết thúc."); location.reload(); });

    function sendMessage() {
        const input = document.getElementById('msg-input');
        if (input.value.trim() && currentRoom) {
            socket.emit('send-message', { room: currentRoom, msg: input.value, isImage: false });
            addMessage(input.value, true, false);
            input.value = '';
        }
    }

    function uploadImage(input) {
        const timePassed = Date.now() - matchStartTime;
        if (timePassed < PHOTO_WAIT) {
            alert(`Vui lòng chờ thêm ${Math.ceil((PHOTO_WAIT - timePassed)/1000)}s để gửi ảnh.`);
            input.value = ""; return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            socket.emit('send-message', { room: currentRoom, msg: e.target.result, isImage: true });
            addMessage(e.target.result, true, true);
        };
        reader.readAsDataURL(input.files[0]);
    }

    socket.on('receive-message', (data) => addMessage(data.msg, false, data.isImage));
    function addMessage(content, isMine, isImage) {
        const div = document.createElement('div');
        div.className = `msg ${isMine ? 'my-msg' : 'stranger-msg'}`;
        if (isImage) { const img = document.createElement('img'); img.src = content; div.appendChild(img); }
        else { div.innerText = content; }
        document.getElementById('chat-box').appendChild(div);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function handleTyping() {
        socket.emit('typing', { room: currentRoom, isTyping: true });
        setTimeout(() => socket.emit('typing', { room: currentRoom, isTyping: false }), 2000);
    }
    socket.on('display-typing', (is) => document.getElementById('typing-notify').innerText = is ? "Người ấy đang nhập..." : "");
    function sendHeart() { if(currentRoom) { socket.emit('send-heart', { room: currentRoom }); addMessage("❤️", true, false); } }
    socket.on('receive-heart', () => addMessage("❤️", false, false));
    function leaveRoom() { if(confirm("Rời phòng?")) socket.emit('leave-room'); }
    function addSystemMessage(text) {
        const div = document.createElement('div'); div.style = "text-align:center;font-size:11px;color:#ff7675;margin:5px 0;";
        div.innerText = text; document.getElementById('chat-box').appendChild(div);
    }
</script>
</body>
</html>
