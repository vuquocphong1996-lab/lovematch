<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVEMATCH - Kết nối trái tim</title>
    <style>
        /* Tông màu LoveMatch: Hồng-Đỏ lãng mạn */
        :root {
            --primary-color: #ff4757; /* Màu hồng hồng giống hình ảnh */
            --bg-color: #fff0f0; /* Nền hồng nhạt giống hình ảnh */
            --text-color: #333;
            --stanger-msg-bg: #f1f2f6; /* Màu tin nhắn người lạ (xám nhạt) */
            --status-bg: #ffebee; /* Màu nền trạng thái */
            --system-msg-color: #ff7675; /* Màu thông báo hệ thống */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Font modernize UI */
        }

        body {
            background-color: #eee; /* Nền ngoài cho khung điện thoại */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Khung giống điện thoại thực */
        .app-container {
            width: 360px;
            height: 640px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Thanh trên cùng LOVEMATCH */
        .header {
            background-color: var(--primary-color);
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        /* Phần chứa tin nhắn */
        .chat-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            padding: 15px;
            overflow-y: auto;
        }

        /* Hộp trạng thái chat */
        .status-box {
            background-color: var(--status-bg);
            color: var(--primary-color);
            padding: 8px 15px;
            text-align: center;
            border-radius: 15px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        /* Thông báo hệ thống */
        .system-box {
            color: var(--system-msg-color);
            padding: 8px 15px;
            text-align: center;
            border-radius: 15px;
            font-size: 11px;
            margin-bottom: 15px;
        }

        /* Khu vực tin nhắn */
        .messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Bong bóng tin nhắn */
        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 75%;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }

        .message.stranger {
            align-self: flex-start;
            background-color: var(--stanger-msg-bg);
            color: #000;
            border-bottom-left-radius: 4px;
        }

        .message.mine {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        /* --- VÙNG NHẬP LIỆU: ĐÃ CĂN CHỈNH LẠI --- */
        .input-area {
            display: flex;
            align-items: center;
            background: #fff;
            padding: 10px 15px;
            border-top: 1px solid #eee;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            /* Sửa vấn đề: Thêm lề dưới để không bị cạnh màn hình che */
            padding-bottom: env(safe-area-inset-bottom, 10px); 
        }

        .btn-icon {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--primary-color);
            flex-shrink: 0;
            width: 36px;
            display: flex;
            justify-content: center;
            margin-right: 8px; /* Khoảng cách lề */
        }

        /* Sửa vấn đề: Ô nhập tin nhắn chiếm không gian chính */
        input {
            flex-grow: 1; /* Chiếm tối đa không gian còn lại */
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            margin-right: 10px; /* Thêm khoảng cách cho nút Gửi */
            width: 0; /* Đảm bảo ô input có thể nén */
        }

        input:focus {
            border-color: var(--primary-color);
        }

        /* Nút Gửi đã được căn chỉnh */
        .btn-send {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            /* Sửa vấn đề: Đảm bảo nút Gửi không bị nén, mất chữ */
            flex-shrink: 0; 
            white-space: nowrap; /* Không cho chữ Gửi xuống dòng */
        }

        .btn-send:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">LOVEMATCH</div>
    
    <div class="chat-area">
        <div class="status-box">Đang chat với: Kkk</div>
        <div class="system-box">Đã kết nối! Bạn có thể gửi ảnh sau 1 phút.</div>
        
        <div class="messages">
            <div class="message stranger">Aa</div>
            <div class="message mine">muôn gì</div>
            <div class="message stranger">muốn làm bạn</div>
            <div class="message mine">oke</div>
        </div>
    </div>

    <div class="input-area">
        <button class="btn-icon heart">❤️</button>
        <button class="btn-icon attachment">📎</button>
        <input type="text" placeholder="Nhập tin...">
        <button class="btn-send">GỬI</button>
    </div>
</div>

<script>
    // Mã JavaScript để giả lập gửi tin nhắn (dựa trên cấu trúc tin nhắn của bạn)
    const chatBoxMessages = document.querySelector('.chat-area .messages');
    const inputField = document.querySelector('.input-area input');
    const sendBtn = document.querySelector('.input-area .btn-send');

    function addMessage(content, isMine) {
        const div = document.createElement('div');
        div.className = `message ${isMine ? 'mine' : 'stranger'}`;
        div.innerText = content;
        chatBoxMessages.appendChild(div);
        // Tự động cuộn xuống cuối
        document.querySelector('.chat-area').scrollTop = document.querySelector('.chat-area').scrollHeight;
    }

    function sendMessage() {
        if (inputField.value.trim()) {
            addMessage(inputField.value, true);
            inputField.value = '';
            // Giả lập trả lời sau 1 giây
            setTimeout(() => {
                addMessage("Giả lập trả lời từ người lạ", false);
            }, 1000);
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>
</body>
</html>
